<div class="card-item" [class.selected]="isSelected()">
  <div class="card-header" (dblclick)="edit.emit(card())">
    <p class="card-question" [innerHTML]="renderedQuestion()"></p>
  </div>

  <div
    class="card-answer-spoiler"
    [class.revealed]="answerRevealed()"
    (click)="answerRevealed.set(!answerRevealed())"
  >
    @if (!answerRevealed()) {
      <div class="spoiler-blur">
        <div class="spoiler-particles">
          @for (p of particles; track p) {
            <span class="particle" [style.left.%]="p.x" [style.top.%]="p.y" [style.animation-delay]="p.delay"></span>
          }
        </div>
        <span class="spoiler-hint">Нажмите, чтобы увидеть ответ</span>
      </div>
    } @else {
      <div class="card-answer" [innerHTML]="renderedAnswer()"></div>
    }
  </div>

  @if (card().tags.length > 0) {
    <div class="card-tags">
      @for (tag of card().tags; track tag) {
        <app-tag-pill [name]="tag" />
      }
    </div>
  }

  <div class="card-footer">
    <div class="card-box">
      <span class="card-date">{{ card().nextReviewDate | relativeDate }}</span>
      <span class="card-status" [class]="getStatusClass(card())">
        {{ getStatusLabel(card()) }}
      </span>
    </div>
    <div class="card-actions">
      <input
        type="checkbox"
        class="card-checkbox"
        [checked]="isSelected()"
        (change)="toggleSelection()"
        aria-label="Выбрать карточку"
      />
      <button class="btn-icon" (click)="edit.emit(card())" aria-label="Редактировать">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button class="btn-icon btn-danger" (click)="delete.emit(card())" aria-label="Удалить">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </div>
  </div>
</div>
