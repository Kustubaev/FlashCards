<div class="editor-overlay" (click)="onCancel()">
  <div class="editor-modal" (click)="$event.stopPropagation()">
    <div class="editor-header">
      <h2 class="editor-title">{{ modalTitle() }}</h2>
      <button class="btn-close" (click)="onCancel()" aria-label="Закрыть">&times;</button>
    </div>

    <div class="editor-tabs">
      <button
        class="tab"
        [class.active]="activeTab() === 'edit'"
        (click)="activeTab.set('edit')"
      >
        Редактирование
      </button>
      <button
        class="tab"
        [class.active]="activeTab() === 'preview'"
        (click)="activeTab.set('preview')"
      >
        Предпросмотр
      </button>
    </div>

    <div class="editor-body">
      @if (activeTab() === 'edit') {
        <div class="editor-form">
          <div class="form-group">
            <label class="form-label" for="question">Вопрос</label>
            <div class="textarea-wrapper">
              <textarea
                id="question"
                class="form-textarea"
                rows="4"
                placeholder="Введите вопрос (поддерживается Markdown и LaTeX)..."
                [value]="question()"
                (input)="question.set($any($event.target).value)"
              ></textarea>
              <button class="btn-image" (click)="insertImage('question')" title="Вставить изображение" aria-label="Вставить изображение">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="m21 15-5-5L5 21"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="answer">Ответ</label>
            <div class="textarea-wrapper">
              <textarea
                id="answer"
                class="form-textarea"
                rows="4"
                placeholder="Введите ответ (поддерживается Markdown и LaTeX)..."
                [value]="answer()"
                (input)="answer.set($any($event.target).value)"
              ></textarea>
              <button class="btn-image" (click)="insertImage('answer')" title="Вставить изображение" aria-label="Вставить изображение">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <path d="m21 15-5-5L5 21"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Теги</label>
            <app-tag-input
              [model]="tags()"
              [suggestions]="suggestions()"
              (modelChange)="onTagsChange($event)"
            />
          </div>
        </div>
      } @else {
        <div class="editor-preview">
          <app-flashcard
            [frontContent]="question()"
            [backContent]="answer()"
            [isFlipped]="previewFlipped()"
            (flipped)="previewFlipped.set($event)"
          />
        </div>
      }
    </div>

    <div class="editor-footer">
      <button class="btn btn-secondary" (click)="onCancel()">Отмена</button>
      <button class="btn btn-primary" [disabled]="!isValid()" (click)="onSave()">
        {{ isEdit() ? 'Сохранить' : 'Создать' }}
      </button>
    </div>
  </div>
</div>
