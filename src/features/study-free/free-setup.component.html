<div class="setup-container">
  <div class="setup-header">
    <a class="btn-back-home" routerLink="/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      На главную
    </a>
  </div>
  
  <div class="setup-wrapper">
    <h1 class="setup-title">Свободное изучение</h1>

    <div class="setup-section">
      <h2 class="section-title">Фильтр по тегам</h2>
      @if (tags().length === 0) {
        <p class="empty-text">Нет тегов</p>
      } @else {
        <div class="tag-chips">
          @for (tag of tags(); track tag.id) {
            <button
              class="tag-chip"
              [class.active]="selectedTags().includes(tag.name)"
              (click)="toggleTag(tag.name)"
            >
              <span class="tag-dot" [class]="getTagCssClass(tag.usageCount)"></span>
              {{ tag.name }}
              <span class="tag-count">{{ tag.usageCount }}</span>
            </button>
          }
        </div>
      }
    </div>

    <div class="setup-section">
      <label class="reverse-toggle">
        <input class="toggle-checkbox" type="checkbox" [checked]="reverseMode()" (change)="toggleReverse()" />
        <span class="toggle-label">Реверс (вопрос ↔ ответ)</span>
      </label>
    </div>

    <div class="setup-summary">
      <p class="summary-text">
        <strong>{{ totalCards() }}</strong> карточек для изучения
      </p>
    </div>

    <button
      class="btn-start"
      [disabled]="totalCards() === 0"
      (click)="startSession()"
    >
      Начать
    </button>
  </div>
</div>
