name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # или master, в зависимости от вашей основной ветки

# Разрешения, необходимые для деплоя на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Отменяем параллельные запуски, оставляем только последний
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Angular 21 требует Node 20+
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        # Базовый путь важен для корректной работы статики и роутинга на GitHub Pages
        run: npx ng build --configuration production --base-href /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        # Путь к собранным файлам. В Angular 17+ с @angular/build обычно это dist/<project>/browser/
        with:
          path: 'dist/cards/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4